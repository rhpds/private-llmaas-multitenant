---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rhcl-operator
  namespace: openshift-gitops
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    namespace: kuadrant-system
    name: in-cluster
  project: default
  source:
    path: charts/rhcl
    repoURL: https://github.com/jharmison-redhat/openshift-setup
    targetRevision: 88caea33279dcbde96caf50965d29780c8fe8f5b
    helm:
      valuesObject:
        kuadrant:
          spec: null
        authorino:
          overwrite: false
          serviceTls: false
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    managedNamespaceMetadata:
      labels:
        argocd.argoproj.io/managed-by: openshift-gitops
