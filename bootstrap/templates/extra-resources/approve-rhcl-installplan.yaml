---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: approve-rhcl-installplan
  namespace: openshift-gitops
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: approve-rhcl-installplan
rules:
- apiGroups: [operators.coreos.com]
  resources: [installplans, subscriptions]
  verbs: [get, list, patch, update]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: approve-rhcl-installplan
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: approve-rhcl-installplan
subjects:
- kind: ServiceAccount
  name: approve-rhcl-installplan
  namespace: openshift-gitops
---
# Approve the RHCL v1.3.4 install plan at bootstrap PostSync so the
# rhcl-operator app is not blocked by the Helm post-install hook
# circular dependency (UpgradePending subscription -> hook never fires).
apiVersion: batch/v1
kind: Job
metadata:
  name: approve-rhcl-installplan
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 10
  template:
    spec:
      serviceAccountName: approve-rhcl-installplan
      restartPolicy: OnFailure
      containers:
      - name: approve
        image: image-registry.openshift-image-registry.svc:5000/openshift/tools:latest
        imagePullPolicy: IfNotPresent
        command:
        - /bin/bash
        - -c
        - |
          set -euo pipefail
          TARGET_CSV="rhcl-operator.v1.3.4"
          NAMESPACE="kuadrant-system"

          echo "Waiting for RHCL subscription in $NAMESPACE..."
          until oc get subscription rhcl-operator -n "$NAMESPACE" &>/dev/null; do
            echo "  waiting for subscription..."; sleep 10
          done

          echo "Looking for install plan containing $TARGET_CSV..."
          for i in $(seq 1 60); do
            PLAN=$(oc get installplan -n "$NAMESPACE" -o json | \
              python3 -c "
import sys, json
data = json.load(sys.stdin)
for item in data.get('items', []):
    csvs = item.get('spec', {}).get('clusterServiceVersionNames', [])
    if '$TARGET_CSV' in csvs and not item.get('spec', {}).get('approved', False):
        print(item['metadata']['name'])
        break
" 2>/dev/null)
            if [ -n "$PLAN" ]; then
              echo "Approving install plan: $PLAN"
              oc patch installplan "$PLAN" -n "$NAMESPACE" \
                --type=merge -p '{"spec":{"approved":true}}'
              echo "Done — $TARGET_CSV install plan approved."
              exit 0
            fi
            echo "  attempt $i/60: no pending plan yet, waiting 10s..."
            sleep 10
          done
          echo "ERROR: timed out waiting for install plan"
          exit 1
