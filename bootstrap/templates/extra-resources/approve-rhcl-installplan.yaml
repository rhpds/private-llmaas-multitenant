---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: approve-rhcl-installplan
  namespace: openshift-gitops
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: approve-rhcl-installplan
rules:
- apiGroups: [operators.coreos.com]
  resources: [installplans, subscriptions]
  verbs: [get, list, patch, update]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: approve-rhcl-installplan
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: approve-rhcl-installplan
subjects:
- kind: ServiceAccount
  name: approve-rhcl-installplan
  namespace: openshift-gitops
---
# Approve the RHCL v1.3.4 install plan at bootstrap PostSync so the
# rhcl-operator app is not blocked by the Helm post-install hook
# circular dependency (UpgradePending subscription -> hook never fires).
apiVersion: batch/v1
kind: Job
metadata:
  name: approve-rhcl-installplan
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 10
  template:
    spec:
      serviceAccountName: approve-rhcl-installplan
      restartPolicy: OnFailure
      containers:
      - name: approve
        image: image-registry.openshift-image-registry.svc:5000/openshift/tools:latest
        imagePullPolicy: IfNotPresent
        command: ["/bin/bash", "-c"]
        args:
        - |
          set -euo pipefail
          TARGET_CSV="rhcl-operator.v1.3.4"
          NS="kuadrant-system"

          echo "Waiting for RHCL subscription in $NS..."
          until oc get subscription rhcl-operator -n "$NS" &>/dev/null; do
            echo "  waiting..."; sleep 10
          done

          echo "Looking for unapproved install plan containing $TARGET_CSV..."
          for i in $(seq 1 60); do
            for plan in $(oc get installplan -n "$NS" -o jsonpath='{.items[*].metadata.name}'); do
              csvs=$(oc get installplan "$plan" -n "$NS" -o jsonpath='{.spec.clusterServiceVersionNames}')
              approved=$(oc get installplan "$plan" -n "$NS" -o jsonpath='{.spec.approved}')
              if echo "$csvs" | grep -q "$TARGET_CSV" && [ "$approved" = "false" ]; then
                echo "Approving install plan: $plan"
                oc patch installplan "$plan" -n "$NS" --type=merge -p '{"spec":{"approved":true}}'
                echo "Done."
                exit 0
              fi
            done
            echo "  attempt $i/60: no pending plan yet, waiting 10s..."
            sleep 10
          done
          echo "ERROR: timed out waiting for install plan"
          exit 1
